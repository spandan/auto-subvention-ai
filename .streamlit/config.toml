# Presentation-ready theme: high contrast, muted slate accents (no bright red).
# https://docs.streamlit.io/develop/concepts/configuration/theming

[theme]
primaryColor = "#475569"
backgroundColor = "#f4f4f5"
secondaryBackgroundColor = "#ffffff"
textColor = "#18181b"
font = "sans serif"

[client]
toolbarMode = "minimal"

[server]
headless = true
enableCORS = false
enableXsrfProtection = false
address = "0.0.0.0"

