# Railway config-as-code: https://docs.railway.com/reference/config-as-code
# Uses the Dockerfile (OpenMP for LightGBM). NiceGUI binds 0.0.0.0:$PORT via app.py.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Single replica: in-memory MODEL + WebSockets are not suitable for multi-replica without sticky sessions.
numReplicas = 1
healthcheckPath = "/"
healthcheckTimeout = 180
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
